name: Build Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./application_source
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify build artifact
        working-directory: ./application_source
        run: |
          python app.py
          echo "Build verification successful" > build_status.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: application_source/build_status.txt
