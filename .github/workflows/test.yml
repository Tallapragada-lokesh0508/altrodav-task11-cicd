name: Test Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./application_source
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting (Code Quality Check)
        working-directory: ./application_source
        run: |
          flake8 app.py --max-line-length=100

      - name: Run unit tests
        working-directory: ./application_source
        run: |
          pytest test_app.py -v

      - name: Notify on failure
        if: failure()
        run: echo "Tests failed! Check logs above for details."
